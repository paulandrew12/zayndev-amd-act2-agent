# Builds and pushes the Track 1 submission image to GHCR on every push to main.
# Uses the workflow's own GITHUB_TOKEN (packages:write) — no PAT/device-flow needed.
name: publish-image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ghcr.io/paulandrew12/zayndev-agent:latest
          labels: |
            org.opencontainers.image.source=https://github.com/paulandrew12/zayndev-amd-act2-agent
